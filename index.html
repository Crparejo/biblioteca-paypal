<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#f0f2f5;color:#333;padding:20px}
.container{max-width:900px;margin:0 auto}
.header{background:#003087;color:#fff;border-radius:10px;padding:20px 24px;margin-bottom:20px}
.header h1{font-size:20px;font-weight:500}
.header p{font-size:13px;opacity:.75;margin-top:4px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.cat-btn{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid #ccc;background:#fff;color:#555;cursor:pointer}
.cat-btn.active{background:#003087;color:#fff;border-color:#003087}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#999;padding:12px 0 6px;border-top:1px solid #e0e0e0;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#003087}
.card.active{border:2px solid #003087}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.card-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.card-title{font-size:13px;font-weight:600;color:#222;line-height:1.4}
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.badge{font-size:10px;padding:2px 8px;border-radius:10px}
.b-woo{background:#E6F1FB;color:#0C447C}
.b-shop{background:#EAF3DE;color:#27500A}
.b-custom{background:#FAEEDA;color:#633806}
.b-all{background:#EEEDFE;color:#3C3489}
.b-dev{background:#FBEAF0;color:#72243E}
.b-env{background:#F1EFE8;color:#444441}
.card-desc{font-size:12px;color:#666;line-height:1.5;margin-bottom:8px}
.cause-list{border-top:1px solid #f0f0f0;padding-top:8px}
.cause-item{display:flex;gap:6px;align-items:flex-start;padding:3px 0;font-size:11px;color:#666}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}
.detail{background:#f8f9fa;border-radius:10px;padding:16px;margin-top:16px;display:none}
.detail.open{display:block}
.detail-title{font-size:15px;font-weight:600;color:#003087;margin-bottom:12px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;border-bottom:1px solid #e0e0e0;padding-bottom:10px}
.tab{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid #ccc;background:#fff;color:#555;cursor:pointer}
.tab.active{background:#003087;color:#fff;border-color:#003087}
.tab-content{display:none}.tab-content.active{display:block}
.steps{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.step{display:flex;gap:10px;align-items:flex-start}
.step-num{width:22px;height:22px;border-radius:50%;background:#003087;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:1px}
.step-text{font-size:13px;color:#333;line-height:1.6}
.tip{background:#EEF4FB;border:1px solid #B3CCE8;border-radius:8px;padding:10px 12px;font-size:12px;color:#0C447C;margin-top:10px;line-height:1.6}
.warn{background:#FAEEDA;border:1px solid #E5C97A;border-radius:8px;padding:10px 12px;font-size:12px;color:#633806;margin-top:8px;line-height:1.6}
.plat-block{background:#fff;border-radius:8px;padding:10px 12px;margin-bottom:8px;border:1px solid #e0e0e0}
.plat-item{font-size:12px;color:#555;padding:3px 0;border-bottom:1px solid #f5f5f5;line-height:1.5}
.plat-item:last-child{border-bottom:none}
.cons-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.cons-table th{background:#003087;color:#fff;padding:7px 10px;text-align:left;font-size:11px}
.cons-table td{padding:7px 10px;border-bottom:1px solid #f0f0f0;color:#333;vertical-align:top}
.code{font-family:monospace;font-size:11px;background:#f0f0f0;padding:2px 6px;border-radius:4px}
.checklist{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.check-item{display:flex;align-items:center;gap:8px;font-size:13px;color:#333}
.check-item input{width:16px;height:16px;cursor:pointer}
.chat-box{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px;font-size:12px;color:#333;line-height:1.7;font-style:italic;margin-top:8px;border-left:3px solid #003087}
.total{font-size:11px;color:#999;background:#fff;padding:4px 10px;border-radius:20px;border:1px solid #e0e0e0}
</style>

const lP={woo:'WooCommerce',shopify:'Shopify',custom:'Loja própria',dev:'Desenvolvimento',env:'Ambiente'};
const bP={woo:'b-woo',shopify:'b-shop',custom:'b-custom',dev:'b-dev',env:'b-env'};
let sel=null,fil='todos';

function filtrar(c,btn){
  fil=c;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();fecharDetalhe();
}

function renderGrid(){
  const g=document.getElementById('grid');
  const lista=fil==='todos'?S:S.filter(s=>s.cat.includes(fil));
  document.getElementById('total').textContent=lista.length+' scripts';
  const atend=lista.filter(s=>!s.cat.includes('dev')&&!s.cat.includes('env'));
  const dev=lista.filter(s=>s.cat.includes('dev'));
  const env=lista.filter(s=>s.cat.includes('env'));
  let html='';
  if(atend.length){
    if(fil==='todos') html+=`<div style="grid-column:1/-1" class="section-label">Scripts de atendimento</div>`;
    html+=atend.map(cardHtml).join('');
  }
  if(dev.length){
    if(fil==='todos') html+=`<div style="grid-column:1/-1" class="section-label">Erros de desenvolvimento</div>`;
    html+=dev.map(cardHtml).join('');
  }
  if(env.length){
    if(fil==='todos') html+=`<div style="grid-column:1/-1" class="section-label">Problemas de ambiente</div>`;
    html+=env.map(cardHtml).join('');
  }
  g.innerHTML=html;
}

function cardHtml(s){
  const pb=s.plat.length===3&&s.plat.every(p=>['woo','shopify','custom'].includes(p))
    ?'<span class="badge b-all">Todas as plataformas</span>'
    :s.plat.map(p=>`<span class="badge ${bP[p]||'b-dev'}">${lP[p]||p}</span>`).join('');
  return `<div class="card${sel===s.id?' active':''}" onclick="abrirDetalhe(${s.id})">
    <div class="card-header"><div class="card-icon" style="background:${s.cor};color:${s.corT}">${s.icon}</div><div class="card-title">${s.title}</div></div>
    <div class="badges">${pb}</div>
    <div class="card-desc">${s.desc}</div>
    <div class="cause-list">${s.causas.map(c=>`<div class="cause-item"><div class="dot" style="background:${s.dot}"></div>${c}</div>`).join('')}</div>
  </div>`;
}

function abrirDetalhe(id){
  if(sel===id){fecharDetalhe();return;}
  sel=id;
  const s=S.find(x=>x.id===id);
  const panel=document.getElementById('detail');
  const pkeys=Object.keys(s.plats);
  const ptabs=pkeys.map((k,i)=>`<button class="tab${i===0?' active':''}" onclick="stab('pp-${k.replace(/ /g,'_')}-${id}',this,'pg-${id}')">${k}</button>`).join('');
  const pcont=pkeys.map((k,i)=>`<div class="tab-content${i===0?' active':''}" id="pp-${k.replace(/ /g,'_')}-${id}"><div class="plat-block">${s.plats[k].map(c=>`<div class="plat-item">${c}</div>`).join('')}</div></div>`).join('');
  const consHtml=s.console.length?`<div style="margin-top:12px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;color:#999;margin-bottom:6px">Erros do console (F12)</div><table class="cons-table"><thead><tr><th>Erro</th><th>Causa</th></tr></thead><tbody>${s.console.map(e=>`<tr><td><span class="code">${e.e}</span></td><td>${e.c}</td></tr>`).join('')}</tbody></table></div>`:''
  const chatHtml=s.chat.length?s.chat.map(c=>`<div class="chat-box">"${c}"</div>`).join(''):`<p style="font-size:13px;color:#999;margin-top:8px">Script interno — sem template de chat para cliente.</p>`;

  panel.innerHTML=`
    <div class="detail-title">${s.icon} ${s.title}</div>
    <div class="tabs">
      <button class="tab active" onclick="stab('td-${id}',this,'mg-${id}')">Diagnóstico</button>
      <button class="tab" onclick="stab('tp-${id}',this,'mg-${id}')">Por tipo</button>
      <button class="tab" onclick="stab('tc-${id}',this,'mg-${id}')">Script do chat</button>
      <button class="tab" onclick="stab('tk-${id}',this,'mg-${id}')">Checklist</button>
    </div>
    <div class="tab-content active" id="td-${id}" data-group="mg-${id}">
      <div class="steps">${s.passos.map((p,i)=>`<div class="step"><div class="step-num">${i+1}</div><div class="step-text">${p}</div></div>`).join('')}</div>
      ${s.dica?`<div class="tip"><strong>Dica:</strong> ${s.dica}</div>`:''}
      ${s.aviso?`<div class="warn"><strong>Atenção:</strong> ${s.aviso}</div>`:''}
      ${consHtml}
    </div>
    <div class="tab-content" id="tp-${id}" data-group="mg-${id}">
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0" id="pg-${id}">${ptabs}</div>${pcont}
    </div>
    <div class="tab-content" id="tc-${id}" data-group="mg-${id}"><div style="margin-top:8px">${chatHtml}</div></div>
    <div class="tab-content" id="tk-${id}" data-group="mg-${id}">
      <div class="checklist">${s.passos.map(p=>`<label class="check-item"><input type="checkbox" onchange="this.parentElement.style.textDecoration=this.checked?'line-through':'none'"> ${p}</label>`).join('')}</div>
    </div>`;
  panel.classList.add('open');
  renderGrid();
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function stab(id,btn,group){
  document.querySelectorAll(`[data-group="${group}"]`).forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.parentElement.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function fecharDetalhe(){
  sel=null;
  const p=document.getElementById('detail');
  p.classList.remove('open');p.innerHTML='';
  renderGrid();
}

renderGrid();
</script>
</body>
</html>
